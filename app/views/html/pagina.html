<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMOO - Jogo</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="game-container">
        <div class="header">
            <h1>TERMOO</h1>
            <div id="stats">Vitórias: <span id="vitorias">0</span> | Sequência: <span id="sequencia">0</span></div>
        </div>

        <div id="tabuleiro"></div>

        <div id="teclado"></div>
        
        <div id="mensagem"></div>
        
        <div class="botoes-fim" style="margin-top: 20px;">
            <button id="btn-jogar-novamente" onclick="iniciarJogo()" style="display:none; background-color: #538d4e; color: white; width: auto; padding: 12px 24px;">Jogar Novamente</button>
            <button id="btn-voltar" onclick="window.location.href='/'" style="display:none; background-color: #3a3a3c; color: white; width: auto; padding: 12px 24px;">Voltar ao Início</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
